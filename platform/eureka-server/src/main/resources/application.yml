server:
  port: 8761

spring:
  application:
    name: eureka-server
  # Config import is intentionally set to optional so the Eureka server itself
  # can start without a running Config Server (chicken-and-egg problem).
  config:
    import: "optional:configserver:http://localhost:8888"

eureka:
  instance:
    hostname: localhost
  client:
    # This node IS the registry — it does not register itself or fetch the registry
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Disable self-preservation in local dev so de-registered services are
    # removed from the dashboard immediately instead of lingering.
    enable-self-preservation: false
    eviction-interval-timer-in-ms: 5000

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    com.netflix: WARN
    com.netflix.eureka: INFO
    org.springframework.cloud.netflix.eureka: INFO
