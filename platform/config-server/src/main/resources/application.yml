server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native          # Use filesystem backend (no Git required for Days 1-5)
  cloud:
    config:
      server:
        native:
          # Default: two directories up from platform/config-server/ to reach project root,
          # then into config-repo/.
          # Override with CONFIG_REPO_PATH env var if your working directory differs.
          # Example: CONFIG_REPO_PATH=file:///C:/Users/SAI VIKRANTH TEJ/Desktop/Microservices_Platform/config-repo
          search-locations:
            - "${CONFIG_REPO_PATH:file:${user.dir}/../../config-repo}"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info, env

logging:
  level:
    org.springframework.cloud.config: DEBUG
