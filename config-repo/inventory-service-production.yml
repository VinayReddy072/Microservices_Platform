
# inventory-service — PRODUCTION profile


spring:
  datasource:
    url: ${INVENTORY_DB_URL}       # NO default — must be set in production env
    username: ${INVENTORY_DB_USER} # NO default — must be set in production env
    password: ${INVENTORY_DB_PASS} # NO default — must be set in production env
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate          # PROD: schema must match entities — fail fast if not
    show-sql: false               # PROD: do NOT log SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# PROD: minimal logging
logging:
  level:
    root: WARN
    com.emergencylending: INFO
    org.springframework.cloud: WARN
